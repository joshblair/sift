name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:

  # ── Deploy infrastructure stacks (Cognito + Database must exist first) ────────
  deploy-backend:
    name: SAM build & deploy
    runs-on: ubuntu-latest
    outputs:
      api-url:         ${{ steps.outputs.outputs.api-url }}
      frontend-bucket: ${{ steps.outputs.outputs.frontend-bucket }}
      cloudfront-id:   ${{ steps.outputs.outputs.cloudfront-id }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        # No --use-container: dotnet publishes natively; Python layer uses Makefile build method
        # All functions are x86_64 to match the ubuntu-latest runner (no cross-arch emulation)
        run: sam build --template-file infrastructure/template.yaml

      - name: SAM deploy — main stack
        # No --template-file here: sam deploy without it reads .aws-sam/build/template.yaml
        # which references the compiled artifacts from sam build above.
        # Specifying infrastructure/template.yaml would bypass the build and repackage raw source.
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --s3-bucket ${{ vars.SAM_BUCKET }} \
            --s3-prefix sift-main \
            --stack-name sift-dev \
            --parameter-overrides Env=dev SamBucket=${{ vars.SAM_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM

      - name: Deploy frontend hosting stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/template-frontend.yaml \
            --stack-name sift-frontend-dev \
            --parameter-overrides Env=dev \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset

      - name: Capture stack outputs
        id: outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name sift-dev \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name sift-frontend-dev \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name sift-frontend-dev \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "api-url=$API_URL"           >> $GITHUB_OUTPUT
          echo "frontend-bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "cloudfront-id=$CF_ID"       >> $GITHUB_OUTPUT

  # ── Build and publish React app ───────────────────────────────────────────────
  deploy-frontend:
    name: Frontend S3 sync
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL:              ${{ needs.deploy-backend.outputs.api-url }}
          VITE_USER_POOL_ID:         ${{ vars.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID:  ${{ vars.VITE_USER_POOL_CLIENT_ID }}
          VITE_COGNITO_DOMAIN:       ${{ vars.VITE_COGNITO_DOMAIN }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ needs.deploy-backend.outputs.frontend-bucket }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be cached so browsers always fetch the latest
          aws s3 cp dist/index.html s3://${{ needs.deploy-backend.outputs.frontend-bucket }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"
        working-directory: frontend

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.deploy-backend.outputs.cloudfront-id }} \
            --paths "/*"
